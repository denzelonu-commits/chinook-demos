<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighten Up Electric — Hero Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

    /* ─── Foundation animations ─── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .anim-fade-in-up { opacity: 0; animation: fadeInUp 0.65s ease forwards; }
    .anim-delay-1 { animation-delay: 0.1s; }
    .anim-delay-2 { animation-delay: 0.25s; }
    .anim-delay-3 { animation-delay: 0.4s; }
    .anim-delay-4 { animation-delay: 0.55s; }
    .anim-delay-5 { animation-delay: 0.7s; }
    .anim-delay-6 { animation-delay: 0.85s; }

    .cta-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #2563EB; color: #fff;
      padding: 14px 28px; border-radius: 8px; border: none;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 16px;
      cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
    }
    .cta-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 32px rgba(37,99,235,0.35);
    }

    .trust-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: #EFF6FF; border: 1px solid #BFDBFE;
      color: #1D4ED8; border-radius: 999px;
      padding: 6px 14px; font-size: 13px; font-weight: 500;
    }
    .trust-badge svg { flex-shrink: 0; }

    .contact-card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.05);
      padding: 32px;
    }

    .service-pill {
      display: inline-block;
      background: #F8FAFC; border: 1px solid #E2E8F0;
      color: #475569; border-radius: 6px;
      padding: 4px 12px; font-size: 13px; font-weight: 500;
      margin: 3px;
    }

    /* ─── Growth Engine animations ─── */
    @keyframes wordReveal {
      from { opacity: 0; transform: translateY(22px); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    .word-span {
      display: inline-block;
      opacity: 0;
      animation: wordReveal 0.55s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .wd-0 { animation-delay: 0.3s; }
    .wd-1 { animation-delay: 0.5s; }
    .wd-2 { animation-delay: 0.7s; }
    .wd-3 { animation-delay: 0.9s; }
    .wd-4 { animation-delay: 1.1s; }
    .wd-5 { animation-delay: 1.3s; }

    @keyframes floatA {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-10px); }
    }
    @keyframes floatB {
      0%,100% { transform: translateY(-5px); }
      50%      { transform: translateY(5px); }
    }
    @keyframes floatC {
      0%,100% { transform: translateY(4px); }
      50%      { transform: translateY(-6px); }
    }
    .float-a { animation: floatA 5s ease-in-out infinite; }
    .float-b { animation: floatB 6s ease-in-out infinite; }
    .float-c { animation: floatC 4.5s ease-in-out infinite; }

    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 18px rgba(245,158,11,0.4), 0 4px 20px rgba(245,158,11,0.2); }
      50%      { box-shadow: 0 0 40px rgba(245,158,11,0.7), 0 8px 32px rgba(245,158,11,0.35); }
    }
    .glow-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #F59E0B, #FBBF24, #F59E0B);
      background-size: 200% 100%;
      color: #0a0e1a; font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 17px;
      padding: 16px 36px; border-radius: 10px; border: none;
      cursor: pointer; text-decoration: none;
      animation: glowPulse 2.5s ease-in-out infinite;
      transition: transform 0.2s ease;
    }
    .glow-btn:hover { transform: scale(1.04); }

    .stat-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 14px; padding: 24px 28px;
      color: #fff; transition: transform 0.25s ease, background 0.25s ease;
      cursor: default;
    }
    .stat-card:hover {
      transform: scale(1.06) !important;
      background: rgba(255,255,255,0.13);
    }

    @keyframes subtleFadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .ge-fade { opacity: 0; animation: subtleFadeIn 0.7s ease forwards; }
    .ge-d1 { animation-delay: 1.6s; }
    .ge-d2 { animation-delay: 1.9s; }
    .ge-d3 { animation-delay: 2.2s; }
    .ge-d4 { animation-delay: 2.5s; }

    /* ─── Tier label pills ─── */
    .tier-label-wrap {
      display: flex; justify-content: center; padding: 10px 0;
    }
    .tier-label-foundation {
      background: #EFF6FF; border: 1.5px solid #93C5FD;
      color: #1D4ED8; font-size: 13px; font-weight: 700;
      padding: 5px 18px; border-radius: 999px; letter-spacing: 0.03em;
      font-family: 'Inter', sans-serif;
    }
    .tier-label-growth {
      background: rgba(245,158,11,0.15); border: 1.5px solid rgba(245,158,11,0.5);
      color: #FBBF24; font-size: 13px; font-weight: 700;
      padding: 5px 18px; border-radius: 999px; letter-spacing: 0.03em;
      font-family: 'Space Grotesk', sans-serif;
    }
  </style>
</head>
<body>
<div id="root"></div>

                    {item}
