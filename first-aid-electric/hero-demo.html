<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>First Aid Electric — Hero Demo</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; }

    /* ── Foundation animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fi-fade { opacity: 0; animation: fadeInUp 0.65s cubic-bezier(0.22,1,0.36,1) forwards; }

    /* ── Growth Engine word reveal ── */
    @keyframes wordReveal {
      from { opacity: 0; transform: translateY(28px) skewY(2deg); }
      to   { opacity: 1; transform: translateY(0) skewY(0deg); }
    }
    .ge-word {
      opacity: 0;
      display: inline-block;
      animation: wordReveal 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* card float-in */
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .ge-float { opacity: 0; animation: floatIn 0.6s cubic-bezier(0.22,1,0.36,1) forwards; }

    /* ambient drift on stat cards */
    @keyframes drift {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-5px); }
    }

    /* CTA shimmer */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* Foundation service row hover */
    .svc-row { transition: background 0.18s, padding-left 0.18s; }
    .svc-row:hover { background: #fafafa; padding-left: 0.5rem; }

    /* Growth Engine CTA button */
    .ge-cta-primary {
      background: linear-gradient(135deg, #FFFFFF 0%, #F5F5F5 50%, #FFFFFF 100%);
      background-size: 200% auto;
      transition: background-position 0.5s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    .ge-cta-primary:hover {
      background-position: right center;
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(255,255,255,0.2);
    }

    /* Stat card hover */
    .stat-card {
      transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), background 0.25s, border-color 0.25s;
      will-change: transform;
    }
    .stat-card:hover {
      transform: translateY(-6px) scale(1.03);
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
    }

    /* Foundation CTA hover */
    .fd-cta {
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .fd-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(204,0,0,0.3);
      background: #AA0000;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useRef } = React;

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       FOUNDATION — $2,500
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function FoundationHero() {
      const services = [
        { icon: '🏠', title: 'Residential Electrical',   desc: 'Panel upgrades, wiring, outlets & fixtures' },
        { icon: '🏢', title: 'Commercial Work',          desc: 'Full buildouts, renovations & code upgrades' },
        { icon: '⚡', title: '24/7 Emergency Response',  desc: 'Fast same-day service when it matters most' },
        { icon: '🔌', title: 'New Installations',        desc: 'EV chargers, smart home & lighting systems' },
      ];

      return (
        <section className="bg-white" style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

          {/* Tier label */}
          <div style={{ background: '#111827', color: 'white', textAlign: 'center', padding: '12px 0', fontSize: '11px', fontWeight: 600, letterSpacing: '0.18em', textTransform: 'uppercase' }}>
            Foundation — $2,500
          </div>

          {/* Nav bar */}
          <div style={{ borderBottom: '1px solid #F3F4F6', padding: '0 2rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: '64px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
              <div style={{ width: '32px', height: '32px', borderRadius: '8px', background: '#CC0000', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '18px' }}>➕</div>
              <span style={{ fontWeight: 800, fontSize: '15px', color: '#CC0000', letterSpacing: '-0.02em' }}>First Aid Electric</span>
            </div>
            <div style={{ display: 'flex', gap: '28px', alignItems: 'center' }}>
              {['Services','About','Emergency'].map(l => (
                <a key={l} href="#" style={{ color: '#6B7280', fontSize: '14px', fontWeight: 500, textDecoration: 'none' }}>{l}</a>
              ))}
              <a href="tel:4032509301" style={{ background: '#CC0000', color: '#FFFFFF', fontWeight: 700, fontSize: '14px', padding: '8px 18px', borderRadius: '8px', textDecoration: 'none' }}>
                Call Now
              </a>
            </div>
          </div>

          {/* Main */}
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', padding: '4rem 2rem', maxWidth: '1200px', margin: '0 auto', width: '100%' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '5rem', alignItems: 'center', width: '100%' }}>

              {/* Left */}
              <div>
                {/* Trust badge */}
                <div className="fi-fade" style={{ animationDelay: '0.05s', display: 'inline-flex', alignItems: 'center', gap: '8px', background: '#FEF2F2', border: '1px solid #FECACA', borderRadius: '999px', padding: '6px 16px', marginBottom: '24px' }}>
                  <span style={{ width: '8px', height: '8px', borderRadius: '50%', background: '#CC0000', display: 'inline-block' }}></span>
                  <span style={{ color: '#7F1D1D', fontSize: '13px', fontWeight: 600 }}>Licensed &amp; Insured · 30 Years Serving Calgary</span>
                </div>

                <h1 className="fi-fade" style={{ animationDelay: '0.15s', fontSize: '52px', fontWeight: 900, color: '#111827', lineHeight: 1.08, letterSpacing: '-0.03em', marginBottom: '20px', marginTop: 0 }}>
                  Calgary's Electrical<br />
                  <span style={{ color: '#CC0000' }}>First Responders</span>
                </h1>

                <p className="fi-fade" style={{ animationDelay: '0.28s', color: '#6B7280', fontSize: '17px', lineHeight: 1.7, marginBottom: '36px', maxWidth: '460px' }}>
                  Residential &amp; commercial electrical — emergency response, repairs, renovations, and new installs. Safe, honest, reliable. On call 24 hours a day.
                </p>

                {/* CTAs */}
                <div className="fi-fade" style={{ animationDelay: '0.4s', display: 'flex', gap: '14px', marginBottom: '44px', flexWrap: 'wrap' }}>
                  <a href="tel:4032509301" className="fd-cta" style={{ display: 'inline-flex', alignItems: 'center', gap: '8px', background: '#CC0000', color: '#FFFFFF', fontWeight: 800, fontSize: '17px', padding: '16px 30px', borderRadius: '12px', textDecoration: 'none', cursor: 'pointer' }}>
                    📞 (403) 250-9301
                  </a>
                  <button style={{ display: 'inline-flex', alignItems: 'center', gap: '8px', border: '2px solid #E5E7EB', background: 'transparent', color: '#374151', fontWeight: 600, fontSize: '16px', padding: '14px 26px', borderRadius: '12px', cursor: 'pointer', transition: 'border-color 0.15s, color 0.15s', fontFamily: 'inherit' }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor='#CC0000'; e.currentTarget.style.color='#CC0000'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor='#E5E7EB'; e.currentTarget.style.color='#374151'; }}>
                    Free Quote →
                  </button>
                </div>

                {/* Stats row */}
                <div className="fi-fade" style={{ animationDelay: '0.52s', display: 'flex', gap: '0', borderTop: '1px solid #F3F4F6', paddingTop: '28px' }}>
                  {[['30+','Years Experience'],['500+','Jobs Completed'],['24/7','Emergency Line']].map(([n, l], i) => (
                    <div key={i} style={{ textAlign: 'center', flex: 1, borderRight: i < 2 ? '1px solid #F3F4F6' : 'none', padding: '0 24px' }}>
                      <div style={{ fontSize: '26px', fontWeight: 800, color: '#111827', letterSpacing: '-0.03em' }}>{n}</div>
                      <div style={{ fontSize: '12px', color: '#9CA3AF', fontWeight: 500, marginTop: '2px' }}>{l}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Right — service card */}
              <div className="fi-fade" style={{ animationDelay: '0.35s' }}>
                <div style={{ background: '#FAFAFA', border: '1px solid #E5E7EB', borderRadius: '20px', padding: '32px', boxShadow: '0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04)' }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '20px' }}>
                    <h3 style={{ margin: 0, fontSize: '15px', fontWeight: 700, color: '#111827' }}>What We Do</h3>
                    <span style={{ background: '#DCFCE7', color: '#166534', fontSize: '11px', fontWeight: 700, padding: '3px 10px', borderRadius: '999px' }}>NW Calgary</span>
                  </div>

                  {services.map((s, i) => (
                    <div key={i} className="svc-row" style={{ display: 'flex', alignItems: 'flex-start', gap: '14px', padding: '12px 8px', borderBottom: i < services.length - 1 ? '1px solid #F3F4F6' : 'none', borderRadius: '8px', cursor: 'default' }}>
                      <span style={{ fontSize: '22px', lineHeight: 1, marginTop: '2px' }}>{s.icon}</span>
                      <div>
                        <div style={{ fontSize: '14px', fontWeight: 600, color: '#111827' }}>{s.title}</div>
                        <div style={{ fontSize: '13px', color: '#9CA3AF', marginTop: '2px' }}>{s.desc}</div>
                      </div>
                    </div>
                  ))}

                  {/* Phone card */}
                  <div style={{ marginTop: '24px', background: 'linear-gradient(135deg, #7B0000, #CC0000)', borderRadius: '14px', padding: '20px', textAlign: 'center' }}>
                    <div style={{ color: 'rgba(255,255,255,0.8)', fontSize: '12px', fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: '6px' }}>Call Anytime — We Answer 24/7</div>
                    <div style={{ color: '#FFFFFF', fontSize: '26px', fontWeight: 900, letterSpacing: '-0.03em' }}>(403) 250-9301</div>
                  </div>

                  {/* Google reviews */}
                  <div style={{ marginTop: '16px', display: 'flex', alignItems: 'center', gap: '10px', padding: '12px 16px', background: 'white', borderRadius: '10px', border: '1px solid #E5E7EB' }}>
                    <div style={{ fontSize: '20px' }}>⭐</div>
                    <div>
                      <div style={{ fontSize: '13px', fontWeight: 700, color: '#111827' }}>4.9 / 5 on Google</div>
                      <div style={{ fontSize: '12px', color: '#9CA3AF' }}>Based on 80+ verified reviews</div>
                    </div>
                    <div style={{ marginLeft: 'auto', fontSize: '12px', color: '#6B7280', fontWeight: 500 }}>See Reviews →</div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </section>
      );
    }


    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       GROWTH ENGINE — $4,800
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function GrowthEngineHero() {
      const line1 = ["Calgary's", 'Electrical'];
      const line2 = ['First', 'Responders.'];

      const stats = [
        { num: '500+',  label: 'Jobs Completed',   drift: '2.5s' },
        { num: '30+',   label: 'Years in Calgary',  drift: '3.1s' },
        { num: '4.9★',  label: 'Google Rating',     drift: '2.8s' },
        { num: '24/7',  label: 'Emergency Line',    drift: '3.4s' },
      ];

      const wordDelay = (line, idx) => {
        if (line === 0) return 0.2 + idx * 0.14;
        return 0.2 + line1.length * 0.14 + 0.1 + idx * 0.14;
      };

      return (
        <section
          style={{
            position: 'relative',
            minHeight: '100vh',
            backgroundImage: 'linear-gradient(135deg, #7B0000 0%, #CC0000 50%, #1a1a1a 100%)',
            zIndex: 0,
            display: 'flex',
            flexDirection: 'column',
            overflow: 'hidden',
          }}
        >
          {/* Radial glow layers */}
          <div style={{ position: 'absolute', inset: 0, zIndex: 1, backgroundImage: 'radial-gradient(ellipse 70% 60% at 75% 50%, rgba(204,0,0,0.18) 0%, transparent 65%), radial-gradient(ellipse 50% 40% at 20% 85%, rgba(123,0,0,0.2) 0%, transparent 55%), radial-gradient(ellipse 40% 35% at 10% 10%, rgba(255,80,80,0.1) 0%, transparent 60%)' }}></div>

          {/* Subtle grid texture */}
          <div style={{ position: 'absolute', inset: 0, zIndex: 2, backgroundImage: 'repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.018) 60px, rgba(255,255,255,0.018) 61px), repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.018) 60px, rgba(255,255,255,0.018) 61px)' }}></div>

          {/* Bottom amber accent line */}
          <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: '2px', backgroundImage: 'linear-gradient(90deg, transparent 0%, #CC0000 30%, #FF4444 50%, #CC0000 70%, transparent 100%)', zIndex: 20 }}></div>

          {/* Tier label */}
          <div style={{ position: 'relative', zIndex: 30, textAlign: 'center', padding: '12px 0', background: 'rgba(0,0,0,0.35)', borderBottom: '1px solid rgba(255,255,255,0.08)', fontSize: '11px', fontWeight: 600, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.7)' }}>
            Growth Engine — $4,800
          </div>

          {/* Nav */}
          <div style={{ position: 'relative', zIndex: 30, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 3rem', height: '68px', borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
              <div style={{ width: '36px', height: '36px', borderRadius: '10px', background: 'rgba(255,255,255,0.15)', border: '1px solid rgba(255,255,255,0.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '20px', boxShadow: '0 4px 14px rgba(0,0,0,0.3)' }}>➕</div>
              <div>
                <div style={{ color: 'white', fontWeight: 800, fontSize: '15px', letterSpacing: '-0.02em', lineHeight: 1.1 }}>First Aid Electric</div>
                <div style={{ color: 'rgba(255,200,200,0.7)', fontSize: '11px', fontWeight: 500 }}>NW Calgary Electricians</div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: '32px', alignItems: 'center' }}>
              {['Services','About','Emergency'].map(l => (
                <a key={l} href="#" style={{ color: 'rgba(255,255,255,0.5)', fontSize: '14px', fontWeight: 500, textDecoration: 'none', transition: 'color 0.15s' }}
                  onMouseEnter={e => e.currentTarget.style.color='rgba(255,255,255,0.9)'}
                  onMouseLeave={e => e.currentTarget.style.color='rgba(255,255,255,0.5)'}>
                  {l}
                </a>
              ))}
              <a href="tel:4032509301" className="ge-cta-primary" style={{ color: '#111827', fontWeight: 800, fontSize: '14px', padding: '10px 22px', borderRadius: '10px', textDecoration: 'none', letterSpacing: '-0.01em' }}>
                Call Now
              </a>
            </div>
          </div>

          {/* ── MAIN CONTENT ── */}
          <div style={{ position: 'relative', zIndex: 10, flex: 1, display: 'flex', alignItems: 'center', padding: '3rem 3rem 4rem', maxWidth: '1280px', margin: '0 auto', width: '100%' }}>
            <div style={{ width: '100%' }}>

              {/* Eyebrow badge */}
              <div className="ge-float" style={{ animationDelay: '0.05s', display: 'inline-flex', alignItems: 'center', gap: '10px', border: '1px solid rgba(255,255,255,0.2)', borderRadius: '999px', padding: '8px 18px', marginBottom: '36px', background: 'rgba(255,255,255,0.08)', backdropFilter: 'blur(10px)' }}>
                <span style={{ width: '8px', height: '8px', borderRadius: '50%', background: '#FF4444', display: 'inline-block', boxShadow: '0 0 8px rgba(255,68,68,0.8)', animation: 'drift 2s ease-in-out infinite' }}></span>
                <span style={{ color: 'rgba(255,220,220,0.9)', fontSize: '13px', fontWeight: 600, letterSpacing: '0.04em' }}>
                  NW Calgary · 24/7 Emergency Response · (403) 250-9301
                </span>
              </div>

              {/* Animated headline — Line 1 */}
              <h1 style={{ margin: '0 0 8px 0', lineHeight: 1, letterSpacing: '-0.04em', fontWeight: 900, fontFamily: 'Inter, sans-serif' }}>
                <div style={{ fontSize: 'clamp(56px, 8vw, 96px)', color: 'white' }}>
                  {line1.map((word, i) => (
                    <span key={i} className="ge-word" style={{ animationDelay: `${wordDelay(0, i)}s`, marginRight: '0.28em' }}>
                      {word}
                    </span>
                  ))}
                </div>
                {/* Line 2 — amber highlight on key word */}
                <div style={{ fontSize: 'clamp(56px, 8vw, 96px)', marginTop: '-6px' }}>
                  {line2.map((word, i) => (
                    <span key={i} className="ge-word" style={{
                      animationDelay: `${wordDelay(1, i)}s`,
                      marginRight: '0.28em',
                      color: i === 0 ? 'transparent' : 'rgba(255,255,255,0.92)',
                      backgroundImage: i === 0 ? 'linear-gradient(135deg, #FFFFFF 0%, #FFD0D0 50%, #FFFFFF 100%)' : 'none',
                      WebkitBackgroundClip: i === 0 ? 'text' : 'unset',
                      backgroundClip: i === 0 ? 'text' : 'unset',
                    }}>
                      {word}
                    </span>
                  ))}
                </div>
              </h1>

              {/* Sub headline */}
              <p className="ge-float" style={{ animationDelay: '0.95s', color: 'rgba(255,220,220,0.75)', fontSize: '18px', lineHeight: 1.7, maxWidth: '580px', margin: '28px 0 44px', fontWeight: 400 }}>
                Residential &amp; commercial electrical services — trusted by thousands of Calgary homeowners and businesses. Expert repairs, renovations, and full emergency response.
              </p>

              {/* CTA row */}
              <div className="ge-float" style={{ animationDelay: '1.1s', display: 'flex', gap: '14px', flexWrap: 'wrap', marginBottom: '60px', alignItems: 'center' }}>
                <a href="tel:4032509301" className="ge-cta-primary" style={{ display: 'inline-flex', alignItems: 'center', gap: '10px', color: '#111827', fontWeight: 900, fontSize: '18px', padding: '18px 36px', borderRadius: '16px', textDecoration: 'none', letterSpacing: '-0.02em' }}>
                  ⚡ (403) 250-9301
                </a>
                <button style={{ display: 'inline-flex', alignItems: 'center', gap: '8px', border: '1.5px solid rgba(255,255,255,0.15)', background: 'rgba(255,255,255,0.04)', color: 'rgba(255,255,255,0.8)', fontWeight: 600, fontSize: '16px', padding: '17px 30px', borderRadius: '16px', cursor: 'pointer', backdropFilter: 'blur(8px)', transition: 'background 0.2s, border-color 0.2s', fontFamily: 'inherit' }}
                  onMouseEnter={e => { e.currentTarget.style.background='rgba(255,255,255,0.09)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.3)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background='rgba(255,255,255,0.04)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.15)'; }}>
                  Book an Estimate →
                </button>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginLeft: '8px' }}>
                  <div style={{ display: 'flex', gap: '-6px' }}>
                    {['⭐','⭐','⭐','⭐','⭐'].map((s,i) => <span key={i} style={{ fontSize: '14px' }}>{s}</span>)}
                  </div>
                  <span style={{ color: 'rgba(255,255,255,0.5)', fontSize: '13px', fontWeight: 500 }}>4.9 Google Rating</span>
                </div>
              </div>

              {/* Floating stat cards */}
              <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap' }}>
                {stats.map((s, i) => (
                  <div key={i} className="stat-card ge-float" style={{
                    animationDelay: `${1.3 + i * 0.1}s`,
                    background: 'rgba(255,255,255,0.05)',
                    backdropFilter: 'blur(16px)',
                    border: '1px solid rgba(255,255,255,0.1)',
                    borderRadius: '18px',
                    padding: '22px 28px',
                    cursor: 'default',
                    animation: `floatIn 0.6s ${1.3 + i * 0.1}s cubic-bezier(0.22,1,0.36,1) forwards, drift ${s.drift} ${1.8 + i * 0.3}s ease-in-out infinite`,
                  }}>
                    <div style={{ fontSize: '28px', fontWeight: 900, color: 'white', letterSpacing: '-0.04em', lineHeight: 1 }}>{s.num}</div>
                    <div style={{ fontSize: '12px', color: 'rgba(255,200,200,0.7)', fontWeight: 600, marginTop: '6px', letterSpacing: '0.04em', textTransform: 'uppercase' }}>{s.label}</div>
                  </div>
                ))}
              </div>

            </div>
          </div>
        </section>
      );
    }


    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       APP
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    function App() {
      return (
        <div>
          <FoundationHero />
          <GrowthEngineHero />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
