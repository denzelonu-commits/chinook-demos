<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Origin Energy — Hero Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; }

    /* ── Foundation animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fiu { animation: fadeInUp 0.65s ease both; opacity: 0; }
    .d1  { animation-delay: 0.05s; }
    .d2  { animation-delay: 0.18s; }
    .d3  { animation-delay: 0.32s; }
    .d4  { animation-delay: 0.46s; }
    .d5  { animation-delay: 0.60s; }
    .d6  { animation-delay: 0.74s; }

    .cta-primary {
      background: #059669;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      letter-spacing: 0.01em;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }
    .cta-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 28px rgba(5,150,105,0.38);
    }
    .cta-secondary {
      background: transparent;
      border: 1.5px solid #d1fae5;
      border-radius: 10px;
      padding: 14px 28px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      color: #059669;
      transition: background 0.18s ease, border-color 0.18s ease;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }
    .cta-secondary:hover { background: #ecfdf5; border-color: #a7f3d0; }

    /* ── Growth Engine animations ── */
    @keyframes wordReveal {
      from { opacity: 0; transform: translateY(18px); filter: blur(6px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    .wr {
      display: inline-block;
      opacity: 0;
      animation: wordReveal 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes floatA {
      0%,100% { transform: translateY(0px)   rotate(-1.5deg); }
      50%      { transform: translateY(-14px) rotate(-1.5deg); }
    }
    @keyframes floatB {
      0%,100% { transform: translateY(-8px) rotate(0.8deg); }
      50%      { transform: translateY(8px)  rotate(0.8deg); }
    }
    @keyframes floatC {
      0%,100% { transform: translateY(0px)   rotate(1.2deg); }
      50%      { transform: translateY(-11px) rotate(1.2deg); }
    }
    .fa { animation: floatA 4.2s ease-in-out infinite; }
    .fb { animation: floatB 5.1s ease-in-out infinite; }
    .fc { animation: floatC 3.7s ease-in-out infinite; }

    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 18px rgba(251,191,36,0.45), 0 0 36px rgba(251,191,36,0.18); }
      50%      { box-shadow: 0 0 32px rgba(251,191,36,0.75), 0 0 64px rgba(251,191,36,0.30); }
    }
    .glow-pulse { animation: glowPulse 2.6s ease-in-out infinite; }

    .stat-card {
      background: rgba(255,255,255,0.055);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 18px;
      padding: 1.6rem 1.75rem;
      transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
      cursor: default;
    }
    .stat-card:hover {
      transform: translateY(-6px) scale(1.04) !important;
      box-shadow: 0 24px 48px rgba(0,0,0,0.35) !important;
      border-color: rgba(251,191,36,0.25) !important;
    }

    .dot-grid-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.08;
      background-image: radial-gradient(circle, #ffffff 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.1rem;
      border-radius: 12px;
      border: 1px solid #f3f4f6;
      text-decoration: none;
      transition: border-color 0.18s ease, background 0.18s ease;
    }
    .contact-row:hover { border-color: #a7f3d0; background: #ecfdf5; }
    .contact-row:hover .cr-label { color: #047857; }

    .icon-box {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: #d1fae5;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* Tier bar */
    .tier-bar {
      background: #0f172a;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 11px 32px;
      text-align: center;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }
    .tier-bar strong { color: #e2e8f0; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useRef } = React;

/* ═══════════════════════════════════════
   SECTION 1 — FOUNDATION
═══════════════════════════════════════ */
function FoundationHero() {
  return (
    <section style={{
      minHeight: '100vh',
      background: '#f8fafc',
      display: 'flex',
      alignItems: 'center',
      padding: '5rem 1.5rem',
      fontFamily: "'Space Grotesk', system-ui, sans-serif",
    }}>
      <div style={{ maxWidth: '1120px', margin: '0 auto', width: '100%' }}>

        {/* Trust badge */}
        <div className="fiu d1" style={{ marginBottom: '2.5rem' }}>
          <span style={{
            display: 'inline-flex', alignItems: 'center', gap: '8px',
            background: '#ecfdf5', border: '1px solid #a7f3d0',
            borderRadius: '999px', padding: '6px 16px',
            fontSize: '0.8rem', fontWeight: 600, color: '#047857',
          }}>
            <svg width="15" height="15" viewBox="0 0 20 20" fill="#059669">
              <path fillRule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"/>
            </svg>
            Licensed &amp; Insured · Serving Calgary Since 2018
          </span>
        </div>

        {/* Two-column grid */}
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))',
          gap: '4rem',
          alignItems: 'start',
        }}>

          {/* LEFT — headline + copy + CTAs */}
          <div>
            <h1 className="fiu d2" style={{
              fontSize: 'clamp(2.2rem, 4.5vw, 3.5rem)',
              fontWeight: 800,
              color: '#0f172a',
              lineHeight: 1.18,
              margin: '0 0 1.1rem',
              letterSpacing: '-0.02em',
            }}>
              Save Money.<br />
              <span style={{ color: '#059669' }}>Lower Your Footprint.</span>
            </h1>

            <p className="fiu d3" style={{
              fontSize: '1.05rem', color: '#64748b', lineHeight: 1.72,
              margin: '0 0 0.6rem', maxWidth: '460px',
            }}>
              Origin Energy helps Calgary homeowners and businesses cut energy costs with professional audits, LED retrofits, and solar installations — backed by certified electricians.
            </p>

            <p className="fiu d3" style={{
              fontSize: '0.82rem', color: '#94a3b8', marginBottom: '2rem',
            }}>
              SW Calgary · 303 40 St SW, T3C 1V9
            </p>

            <div className="fiu d4" style={{ display: 'flex', gap: '0.75rem', flexWrap: 'wrap', marginBottom: '2.25rem' }}>
              <button className="cta-primary">Book a Free Energy Audit →</button>
              <button className="cta-secondary">View Our Projects</button>
            </div>

            {/* Service pills */}
            <div className="fiu d5" style={{ display: 'flex', gap: '1.5rem', flexWrap: 'wrap' }}>
              {[['⚡','LED Retrofits'],['☀️','Solar Installs'],['🔋','Energy Audits'],['🔌','Electrical Maintenance']].map(([icon, label]) => (
                <span key={label} style={{
                  display: 'inline-flex', alignItems: 'center', gap: '6px',
                  fontSize: '0.82rem', color: '#475569', fontWeight: 500,
                }}>
                  {icon} {label}
                </span>
              ))}
            </div>
          </div>

          {/* RIGHT — contact card */}
          <div className="fiu d3">
            <div style={{
              background: '#fff',
              borderRadius: '20px',
              border: '1px solid #e2e8f0',
              boxShadow: '0 4px 24px rgba(0,0,0,0.06)',
              padding: '2rem',
            }}>
              <p style={{
                fontSize: '0.72rem', fontWeight: 700, color: '#94a3b8',
                textTransform: 'uppercase', letterSpacing: '0.12em', margin: '0 0 1.4rem',
              }}>Get In Touch</p>

              <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem', marginBottom: '1.75rem' }}>
                <a href="tel:5877030334" className="contact-row">
                  <div className="icon-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#059669" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.09 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92v2z"/>
                    </svg>
                  </div>
                  <div>
                    <p style={{ margin: 0, fontSize: '0.72rem', color: '#94a3b8' }}>Call us</p>
                    <p className="cr-label" style={{ margin: 0, fontWeight: 700, color: '#0f172a', fontSize: '0.97rem', transition: 'color 0.18s' }}>(587) 703-0334</p>
                  </div>
                </a>

                <a href="mailto:info@originenergy.ca" className="contact-row">
                  <div className="icon-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#059669" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                      <polyline points="22,6 12,13 2,6"/>
                    </svg>
                  </div>
                  <div>
                    <p style={{ margin: 0, fontSize: '0.72rem', color: '#94a3b8' }}>Email us</p>
                    <p className="cr-label" style={{ margin: 0, fontWeight: 700, color: '#0f172a', fontSize: '0.97rem', transition: 'color 0.18s' }}>info@originenergy.ca</p>
                  </div>
                </a>
              </div>

              {/* Trust badges grid */}
              <div style={{ borderTop: '1px solid #f1f5f9', paddingTop: '1.4rem' }}>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.6rem' }}>
                  {[
                    ['✅ Licensed','Fully certified & insured'],
                    ['⭐ 5-Star Rated','Local Calgary clients'],
                    ['⚡ Fast Installs','Same-week scheduling'],
                    ['🌿 Eco Certified','Green energy focused'],
                  ].map(([title, sub]) => (
                    <div key={title} style={{
                      background: '#f8fafc', borderRadius: '10px', padding: '0.75rem 0.9rem',
                    }}>
                      <p style={{ margin: '0 0 2px', fontSize: '0.78rem', fontWeight: 700, color: '#334155' }}>{title}</p>
                      <p style={{ margin: 0, fontSize: '0.72rem', color: '#94a3b8' }}>{sub}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ═══════════════════════════════════════
   SECTION 2 — GROWTH ENGINE
═══════════════════════════════════════ */
function GrowthEngineHero() {
  const headlineWords = ["Calgary's", "Premier", "Energy", "Efficiency", "Partner"];

  return (
    <section style={{
      minHeight: '100vh',
      position: 'relative',
      zIndex: 0,
      backgroundImage: 'linear-gradient(140deg, #040d1a 0%, #071a10 35%, #0c1f0c 65%, #0f2810 100%)',
      overflow: 'hidden',
    }}>
      {/* Dot-grid SVG overlay — z:1 */}
      <div className="dot-grid-overlay" />

      {/* Ambient glow orbs — z:2 */}
      <div style={{
        position:'absolute', top:'8%', left:'18%',
        width:'480px', height:'480px', borderRadius:'50%',
        background:'radial-gradient(circle, rgba(16,185,129,0.13) 0%, transparent 68%)',
        zIndex:2, pointerEvents:'none',
      }}/>
      <div style={{
        position:'absolute', bottom:'12%', right:'12%',
        width:'560px', height:'560px', borderRadius:'50%',
        background:'radial-gradient(circle, rgba(251,191,36,0.09) 0%, transparent 68%)',
        zIndex:2, pointerEvents:'none',
      }}/>
      <div style={{
        position:'absolute', top:'50%', left:'55%',
        width:'300px', height:'300px', borderRadius:'50%',
        background:'radial-gradient(circle, rgba(52,211,153,0.07) 0%, transparent 70%)',
        zIndex:2, pointerEvents:'none',
      }}/>

      {/* All content — z:10 */}
      <div style={{
        position:'relative', zIndex:10,
        minHeight:'100vh',
        display:'flex', alignItems:'center',
        padding:'5rem 1.5rem',
        fontFamily:"'Space Grotesk', system-ui, sans-serif",
      }}>
        <div style={{ maxWidth:'1120px', margin:'0 auto', width:'100%' }}>

          {/* Eyebrow pill */}
          <div style={{ marginBottom:'2rem' }}>
            <span style={{
              display:'inline-flex', alignItems:'center', gap:'8px',
              border:'1px solid rgba(251,191,36,0.32)',
              background:'rgba(251,191,36,0.07)',
              borderRadius:'999px',
              padding:'6px 16px',
              fontSize:'0.72rem', fontWeight:700,
              color:'#fbbf24', letterSpacing:'0.12em', textTransform:'uppercase',
            }}>
              ✦ Growth Engine Tier
            </span>
          </div>

          {/* Headline — word-by-word reveal */}
          <h2 style={{
            fontFamily:"'Playfair Display', serif",
            fontSize:'clamp(2.6rem, 6vw, 5rem)',
            fontWeight:700,
            color:'#fff',
            lineHeight:1.15,
            margin:'0 0 1.4rem',
            letterSpacing:'-0.01em',
          }}>
            {headlineWords.map((w, i) => (
              <span
                key={w}
                className="wr"
                style={{
                  animationDelay:`${0.08 + i * 0.13}s`,
                  marginRight: i < headlineWords.length - 1 ? '0.28em' : 0,
                }}
              >{w}</span>
            ))}
            <br/>
            <span
              className="wr"
              style={{
                animationDelay:'0.82s',
                fontStyle:'italic',
                background:'linear-gradient(90deg, #10b981 0%, #34d399 60%, #6ee7b7 100%)',
                WebkitBackgroundClip:'text',
                WebkitTextFillColor:'transparent',
                backgroundClip:'text',
              }}
            >Powered by Origin Energy.</span>
          </h2>

          {/* Sub-copy */}
          <p
            className="wr"
            style={{
              animationDelay:'1s',
              color:'rgba(255,255,255,0.52)',
              fontSize:'1.05rem',
              lineHeight:1.75,
              maxWidth:'520px',
              margin:'0 0 2.75rem',
            }}
          >
            From full-property energy audits to commercial LED retrofits and rooftop solar — Jason Gravelle's certified team transforms Calgary properties into efficient, cost-saving assets.
          </p>

          {/* CTA buttons */}
          <div style={{ display:'flex', gap:'0.9rem', flexWrap:'wrap', marginBottom:'4rem' }}>
            <button
              className="glow-pulse"
              style={{
                background:'linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%)',
                color:'#0a1628',
                border:'none',
                borderRadius:'12px',
                padding:'15px 30px',
                fontFamily:"'Space Grotesk', sans-serif",
                fontWeight:700,
                fontSize:'0.92rem',
                cursor:'pointer',
                letterSpacing:'0.015em',
                transition:'transform 0.2s ease',
              }}
              onMouseEnter={e => e.currentTarget.style.transform='scale(1.07)'}
              onMouseLeave={e => e.currentTarget.style.transform='scale(1)'}
            >
              Start Your Energy Audit →
            </button>
            <button
              style={{
                background:'rgba(255,255,255,0.065)',
                color:'rgba(255,255,255,0.82)',
                border:'1px solid rgba(255,255,255,0.13)',
                borderRadius:'12px',
                padding:'15px 30px',
                fontFamily:"'Space Grotesk', sans-serif",
                fontWeight:600,
                fontSize:'0.92rem',
                cursor:'pointer',
                backdropFilter:'blur(10px)',
                WebkitBackdropFilter:'blur(10px)',
                transition:'background 0.2s ease, border-color 0.2s ease',
              }}
              onMouseEnter={e => { e.currentTarget.style.background='rgba(255,255,255,0.11)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.26)'; }}
              onMouseLeave={e => { e.currentTarget.style.background='rgba(255,255,255,0.065)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.13)'; }}
            >
              (587) 703-0334
            </button>
          </div>

          {/* Floating stat cards */}
          <div style={{
            display:'grid',
            gridTemplateColumns:'repeat(auto-fit, minmax(220px, 1fr))',
            gap:'1.25rem',
          }}>
            {[
              { cls:'fa', stat:'300+',       label:'Projects Completed',  sub:'Across SW Calgary' },
              { cls:'fb', stat:'40%',        label:'Avg. Bill Reduction',  sub:'After LED + solar install' },
              { cls:'fc', stat:'Since 2018', label:'Serving Calgary',      sub:'Licensed & insured' },
            ].map(({ cls, stat, label, sub }) => (
              <div key={stat} className={`stat-card ${cls}`}>
                <p style={{
                  fontFamily:"'Playfair Display', serif",
                  fontSize:'2.6rem',
                  fontWeight:700,
                  color:'#fbbf24',
                  lineHeight:1,
                  margin:'0 0 0.55rem',
                }}>{stat}</p>
                <p style={{
                  color:'#fff', fontWeight:600, fontSize:'0.92rem', margin:'0 0 0.25rem',
                }}>{label}</p>
                <p style={{
                  color:'rgba(255,255,255,0.38)', fontSize:'0.78rem', margin:0,
                }}>{sub}</p>
              </div>
            ))}
          </div>

        </div>
      </div>
    </section>
  );
}

function CtaSection() {
  return (
    <div style={{ padding: '72px 24px', textAlign: 'center', background: '#f8fafc', borderTop: '1px solid #e2e8f0' }}>
      <a
        href="https://calendly.com/denzelo-onuoha/30min"
        style={{
          display: 'inline-flex', alignItems: 'center', gap: '8px',
          background: '#059669', color: '#fff',
          padding: '16px 36px', borderRadius: '12px',
          fontFamily: "'Space Grotesk', system-ui, sans-serif", fontSize: '16px', fontWeight: 700,
          textDecoration: 'none', letterSpacing: '0.01em',
          transition: 'transform 0.2s ease, box-shadow 0.2s ease',
        }}
        onMouseEnter={e => { e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 12px 32px rgba(5,150,105,0.35)'; }}
        onMouseLeave={e => { e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow=''; }}
      >
        Like what you see? Book a free call →
      </a>
    </div>
  );
}

function App() {
  return (
    <div>
      <FoundationHero />
      <GrowthEngineHero />
      <CtaSection />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
