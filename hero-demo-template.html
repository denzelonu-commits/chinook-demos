<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: 'Space Grotesk', sans-serif; }

    /* ── Foundation fade-in-up ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-1 { animation: fadeInUp 0.65s ease both; animation-delay: 0.05s; }
    .anim-2 { animation: fadeInUp 0.65s ease both; animation-delay: 0.2s; }
    .anim-3 { animation: fadeInUp 0.65s ease both; animation-delay: 0.35s; }
    .anim-4 { animation: fadeInUp 0.65s ease both; animation-delay: 0.5s; }
    .anim-5 { animation: fadeInUp 0.65s ease both; animation-delay: 0.65s; }

    /* ── Foundation CTA hover scale ── */
    .f-cta { transition: transform 0.18s ease, box-shadow 0.18s ease; }
    .f-cta:hover { transform: scale(1.04) translateY(-1px); }

    /* ── Growth Engine word reveal ── */
    @keyframes wordReveal {
      from { opacity: 0; transform: translateY(18px) skewY(2deg); filter: blur(3px); }
      to   { opacity: 1; transform: translateY(0) skewY(0); filter: blur(0); }
    }
    .ge-word {
      display: inline-block;
      opacity: 0;
      animation: wordReveal 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* ── Float animations (3 offsets so cards move independently) ── */
    @keyframes floatA {
      0%, 100% { transform: translateY(0px) rotate(-0.5deg); }
      50%       { transform: translateY(-10px) rotate(0.5deg); }
    }
    @keyframes floatB {
      0%, 100% { transform: translateY(0px) rotate(0.5deg); }
      50%       { transform: translateY(-14px) rotate(-0.5deg); }
    }
    @keyframes floatC {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50%       { transform: translateY(-8px) rotate(1deg); }
    }
    .float-a { animation: floatA 4s ease-in-out infinite; }
    .float-b { animation: floatB 5s ease-in-out infinite; }
    .float-c { animation: floatC 4.5s ease-in-out infinite; }

    /* ── Amber glow pulse ── */
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 18px rgba(245,166,35,0.45), 0 0 36px rgba(245,166,35,0.2); }
      50%       { box-shadow: 0 0 36px rgba(245,166,35,0.8), 0 0 72px rgba(245,166,35,0.35); }
    }
    .glow-pulse { animation: glowPulse 2.8s ease-in-out infinite; }

    /* ── Stat card pop-in ── */
    @keyframes statPop {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }
    .stat-pop { animation: statPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    /* ── GE frosted card hover ── */
    .ge-card { transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease; }
    .ge-card:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 24px 60px rgba(0,0,0,0.35); }

    /* ── Scroll reveal (Foundation right card) ── */
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.55s ease, transform 0.55s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── Tier label bar ── */
    .tier-label {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 8px 20px; font-family: 'Space Grotesk', sans-serif;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .f-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect } = React;

/* ═══════════════════════════════════════════════════════════════════
   BRAND CONFIG — swap this entire block to change the brand.
   No hardcoded names, colors, phone numbers, or copy anywhere below.
═══════════════════════════════════════════════════════════════════ */
const BRAND = {
  slug:        "mms-electric",
  name:        "MMS Electric",
  tagline:     "Licensed & Certified. Fixed Price. No Surprises.",
  phone:       "(587) 890-2680",
  niche:       "Master Electrician",
  location:    "Calgary, AB",
  primary:     "#0A1F44",
  secondary:   "#7A9CC4",
  accent:      "#F5A623",
  gradient:    "linear-gradient(135deg, #060F24 0%, #0A1F44 50%, #1A4080 100%)",
  trustSignal: "Alberta Safety Codes Certified",
  stat:        "500+",
  yearFounded: "2004",
};
/* ═══════════════════════════════════════════════════════════════════ */

// Derived values (computed once, never hardcoded)
const phoneHref = `tel:${BRAND.phone.replace(/\D/g, '')}`;
const yearsExp  = new Date().getFullYear() - parseInt(BRAND.yearFounded, 10);

// ── Shared SVG icons ──────────────────────────────────────────────
const PhoneIcon = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l.81-.81a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
  </svg>
);
const ArrowIcon = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
  </svg>
);
const ShieldIcon = ({ color = 'currentColor' }) => (
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
  </svg>
);
const CheckIcon = ({ color = 'currentColor' }) => (
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
);
const ClockIcon = ({ color = 'currentColor' }) => (
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5">
    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
  </svg>
);
const BoltIcon = ({ color = 'currentColor' }) => (
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
  </svg>
);


/* ═══════════════════════════════════════════════════════════════════
   FOUNDATION SECTION
   Shadcn-style · white bg · single accent · two-column layout
═══════════════════════════════════════════════════════════════════ */
function Foundation() {
  useEffect(() => {
    const observer = new IntersectionObserver(
      entries => entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
      }),
      { threshold: 0.15 }
    );
    document.querySelectorAll('.reveal').forEach((el, i) => {
      el.style.transitionDelay = `${i * 0.12}s`;
      observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  // Split tagline at ". " to get headline lines; accent the last phrase
  const phrases = BRAND.tagline.split('. ').map(p => p.replace(/\.$/, ''));

  return (
    <>
      {/* Tier label */}
      <div className="tier-label" style={{ background: BRAND.primary, color: BRAND.secondary }}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        Foundation — $2,500
      </div>

      <section style={{ background: '#f8fafc', minHeight: '100vh', padding: '80px 24px' }}>
        <div style={{ maxWidth: '1100px', margin: '0 auto' }}>

          {/* Trust badge pill */}
          <div className="anim-1" style={{ display: 'flex', justifyContent: 'center', marginBottom: '40px' }}>
            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: '8px',
              background: '#FEF9EE', border: `1px solid ${BRAND.accent}`,
              borderRadius: '9999px', padding: '6px 18px',
              fontSize: '13px', fontWeight: 600, color: BRAND.primary, letterSpacing: '0.02em',
            }}>
              <ShieldIcon color={BRAND.accent} />
              {BRAND.trustSignal}
            </div>
          </div>

          {/* Two-column grid */}
          <div className="f-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '64px', alignItems: 'center' }}>

            {/* LEFT — headline / copy / CTAs */}
            <div>
              <p className="anim-2" style={{
                fontSize: '12px', fontWeight: 700, color: BRAND.primary,
                letterSpacing: '0.1em', textTransform: 'uppercase', margin: '0 0 14px',
              }}>
                {BRAND.niche} · {BRAND.location}
              </p>

              <h1 className="anim-3" style={{
                fontSize: 'clamp(2rem, 4vw, 3.25rem)', fontWeight: 800,
                lineHeight: 1.1, color: '#0f172a', margin: '0 0 24px', letterSpacing: '-0.03em',
              }}>
                {phrases.map((phrase, i) => {
                  const isLast = i === phrases.length - 1;
                  return (
                    <span key={i}>
                      {isLast
                        ? <span style={{ color: BRAND.accent }}>{phrase}.</span>
                        : <>{phrase}.<br /></>
                      }
                    </span>
                  );
                })}
              </h1>

              <p className="anim-4" style={{
                fontSize: '1.05rem', color: '#475569', lineHeight: 1.7,
                margin: '0 0 32px', maxWidth: '460px',
              }}>
                {BRAND.name} is {BRAND.location}'s trusted {BRAND.niche} for residential &amp; commercial work.
                {yearsExp}+ years experience, {BRAND.trustSignal}, 24/7 emergency service — and a price guarantee you can count on.
              </p>

              {/* CTA row */}
              <div className="anim-5" style={{ display: 'flex', flexWrap: 'wrap', gap: '12px', alignItems: 'center' }}>
                <a href={phoneHref} className="f-cta" style={{
                  display: 'inline-flex', alignItems: 'center', gap: '8px',
                  background: BRAND.primary, color: '#fff',
                  padding: '14px 28px', borderRadius: '10px',
                  fontSize: '15px', fontWeight: 700, textDecoration: 'none', letterSpacing: '-0.01em',
                }}>
                  <PhoneIcon /> {BRAND.phone}
                </a>
                <a href="#" style={{
                  display: 'inline-flex', alignItems: 'center', gap: '6px',
                  color: BRAND.primary, fontSize: '15px', fontWeight: 600,
                  textDecoration: 'none', padding: '14px 4px',
                  borderBottom: '2px solid transparent', transition: 'border-color 0.2s ease',
                }}
                onMouseOver={e => e.currentTarget.style.borderColor = BRAND.primary}
                onMouseOut={e => e.currentTarget.style.borderColor = 'transparent'}>
                  Get a Free Quote <ArrowIcon />
                </a>
              </div>

              <p className="anim-5" style={{ fontSize: '12px', color: '#94a3b8', margin: '14px 0 0', fontWeight: 500 }}>
                24/7 Emergency Line Available
              </p>
            </div>

            {/* RIGHT — contact card with phone + trust badges */}
            <div>
              <div className="reveal" style={{
                background: '#fff', border: '1px solid #e2e8f0',
                borderRadius: '20px', padding: '32px',
                boxShadow: '0 4px 24px rgba(0,0,0,0.07)',
              }}>

                {/* Phone icon + number */}
                <div style={{ textAlign: 'center', marginBottom: '28px' }}>
                  <div style={{
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                    width: '52px', height: '52px', borderRadius: '14px',
                    background: '#EEF3FA', marginBottom: '16px',
                  }}>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={BRAND.primary} strokeWidth="2.5">
                      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l.81-.81a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                  </div>
                  <div style={{
                    fontSize: '12px', fontWeight: 700, color: '#94a3b8',
                    letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: '8px',
                  }}>
                    Call us today
                  </div>
                  <a href={phoneHref} style={{
                    display: 'block', fontSize: 'clamp(1.5rem, 3vw, 2rem)', fontWeight: 800,
                    color: BRAND.primary, textDecoration: 'none', letterSpacing: '-0.03em',
                  }}>
                    {BRAND.phone}
                  </a>
                  <p style={{ fontSize: '14px', color: '#94a3b8', margin: '6px 0 0' }}>
                    Free estimates · No obligation
                  </p>
                </div>

                {/* Primary CTA */}
                <a href={phoneHref} className="f-cta" style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px',
                  background: BRAND.accent, color: '#fff',
                  padding: '14px 24px', borderRadius: '10px',
                  fontSize: '15px', fontWeight: 700, textDecoration: 'none',
                  marginBottom: '24px', width: '100%',
                }}>
                  <PhoneIcon /> Call Now — Free Estimate
                </a>

                {/* Trust badges */}
                <div style={{ borderTop: '1px solid #f1f5f9', paddingTop: '20px', display: 'flex', flexDirection: 'column', gap: '12px' }}>
                  {[
                    { icon: <ShieldIcon color={BRAND.accent} />, label: BRAND.trustSignal },
                    { icon: <CheckIcon  color={BRAND.accent} />, label: '5-Year Workmanship Warranty' },
                    { icon: <ClockIcon  color={BRAND.accent} />, label: '24/7 Emergency Response' },
                  ].map(({ icon, label }, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '10px', fontSize: '13px', fontWeight: 500, color: '#334155' }}>
                      {icon} {label}
                    </div>
                  ))}
                </div>

              </div>
            </div>

          </div>
        </div>
      </section>
    </>
  );
}


/* ═══════════════════════════════════════════════════════════════════
   GROWTH ENGINE SECTION
   Full-viewport gradient · Playfair Display · word reveal
   Three frosted stat cards · dot-grid overlay · amber glow CTA
═══════════════════════════════════════════════════════════════════ */
function GrowthEngine() {
  // Word-by-word reveal from tagline (strip trailing period)
  const words = BRAND.tagline.replace(/\.$/, '').split(/\s+/);

  const statCards = [
    { value: BRAND.stat,         label: 'Clients Served',     delay: '1.6s', floatClass: 'float-a', valueColor: '#f8fafc' },
    { value: `${yearsExp}+`,     label: 'Years Experience',   delay: '1.8s', floatClass: 'float-b', valueColor: BRAND.accent },
    { value: '24/7',             label: 'Emergency Response', delay: '2.0s', floatClass: 'float-c', valueColor: BRAND.secondary },
  ];

  return (
    <>
      {/* Tier label */}
      <div className="tier-label" style={{ background: '#060F24', color: '#475569' }}>
        <BoltIcon color={BRAND.accent} />
        <span style={{ color: BRAND.accent }}>Growth Engine — $4,800</span>
      </div>

      <div style={{ background: BRAND.gradient, minHeight: '100vh', position: 'relative', overflow: 'hidden', zIndex: 0 }}>

        {/* Dot-grid SVG overlay — z-index:1, opacity:0.08 */}
        <svg
          style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', zIndex: 1, opacity: 0.08, pointerEvents: 'none' }}
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
              <circle cx="1.5" cy="1.5" r="1.5" fill="white" />
            </pattern>
          </defs>
          <rect width="100%" height="100%" fill="url(#dotgrid)" />
        </svg>

        {/* Decorative glow rings */}
        <div style={{
          position: 'absolute', top: '-180px', right: '-180px',
          width: '600px', height: '600px', borderRadius: '50%',
          background: `radial-gradient(circle, ${BRAND.accent}1A 0%, transparent 70%)`,
          zIndex: 2, pointerEvents: 'none',
        }} />
        <div style={{
          position: 'absolute', bottom: '-250px', left: '-80px',
          width: '500px', height: '500px', borderRadius: '50%',
          background: `radial-gradient(circle, ${BRAND.primary}66 0%, transparent 70%)`,
          zIndex: 2, pointerEvents: 'none',
        }} />

        {/* Main content layer */}
        <div style={{ position: 'relative', zIndex: 10, padding: '100px 24px 80px', maxWidth: '1100px', margin: '0 auto' }}>

          {/* Trust badge */}
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '40px' }}>
            <div className="glow-pulse" style={{
              display: 'inline-flex', alignItems: 'center', gap: '8px',
              background: `${BRAND.accent}26`, border: `1px solid ${BRAND.accent}80`,
              borderRadius: '9999px', padding: '8px 20px',
              fontSize: '12px', fontWeight: 700, color: BRAND.accent,
              letterSpacing: '0.12em', textTransform: 'uppercase',
            }}>
              <ShieldIcon color={BRAND.accent} />
              {BRAND.trustSignal}
            </div>
          </div>

          {/* Word-by-word headline — Playfair Display */}
          <h1 style={{
            fontFamily: "'Playfair Display', Georgia, serif",
            fontSize: 'clamp(2.5rem, 6vw, 5rem)', fontWeight: 900,
            lineHeight: 1.08, textAlign: 'center',
            margin: '0 0 24px', letterSpacing: '-0.04em',
          }}>
            {words.map((word, i) => {
              const isLast = i === words.length - 1;
              return (
                <span key={i}>
                  <span
                    className="ge-word"
                    style={{
                      animationDelay: `${0.3 + i * 0.2}s`,
                      ...(isLast
                        ? {
                            background: `linear-gradient(90deg, ${BRAND.accent}, #FFD166)`,
                            WebkitBackgroundClip: 'text',
                            WebkitTextFillColor: 'transparent',
                            backgroundClip: 'text',
                          }
                        : { color: '#f8fafc' }
                      ),
                    }}
                  >
                    {word}
                  </span>
                  {i < words.length - 1 ? ' ' : ''}
                </span>
              );
            })}
          </h1>

          {/* Subheadline — Space Grotesk */}
          <p style={{
            fontFamily: "'Space Grotesk', sans-serif",
            textAlign: 'center', fontSize: '1.15rem', color: '#94a3b8',
            maxWidth: '580px', margin: '0 auto 64px', lineHeight: 1.7, fontWeight: 400,
          }}>
            {BRAND.niche} with {yearsExp}+ years serving {BRAND.location}.
            Fixed Price Guarantee. 5-Year Workmanship Warranty. 24/7 Emergency Response.
          </p>

          {/* Three frosted-glass stat cards with float animations */}
          <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
            gap: '16px', marginBottom: '64px',
          }}>
            {statCards.map(({ value, label, delay, floatClass, valueColor }) => (
              <div
                key={label}
                className={`ge-card ${floatClass}`}
                style={{
                  background: 'rgba(255,255,255,0.07)',
                  backdropFilter: 'blur(14px)',
                  WebkitBackdropFilter: 'blur(14px)',
                  border: '1px solid rgba(255,255,255,0.13)',
                  borderRadius: '20px', padding: '32px 24px', textAlign: 'center',
                }}
              >
                <div
                  className="stat-pop"
                  style={{
                    fontFamily: "'Playfair Display', serif",
                    fontSize: '3rem', fontWeight: 900,
                    color: valueColor, letterSpacing: '-0.04em', lineHeight: 1,
                    animationDelay: delay,
                  }}
                >
                  {value}
                </div>
                <div style={{
                  fontSize: '12px', color: '#94a3b8', fontWeight: 600,
                  marginTop: '10px', letterSpacing: '0.06em', textTransform: 'uppercase',
                }}>
                  {label}
                </div>
              </div>
            ))}
          </div>

          {/* CTA — amber glow-pulse primary, ghost secondary */}
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '20px' }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '16px', justifyContent: 'center' }}>
              <a
                href={phoneHref}
                className="glow-pulse"
                style={{
                  display: 'inline-flex', alignItems: 'center', gap: '10px',
                  background: BRAND.accent, color: BRAND.primary,
                  padding: '18px 36px', borderRadius: '14px',
                  fontSize: '16px', fontWeight: 700, textDecoration: 'none', letterSpacing: '-0.01em',
                  transition: 'transform 0.2s ease',
                }}
                onMouseOver={e => e.currentTarget.style.transform = 'translateY(-3px)'}
                onMouseOut={e => e.currentTarget.style.transform = 'translateY(0)'}
              >
                <PhoneIcon /> Call {BRAND.phone}
              </a>
              <a
                href="#"
                style={{
                  display: 'inline-flex', alignItems: 'center', gap: '10px',
                  background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.2)',
                  color: '#f1f5f9', padding: '18px 36px', borderRadius: '14px',
                  fontSize: '16px', fontWeight: 600, textDecoration: 'none', letterSpacing: '-0.01em',
                  transition: 'background 0.2s ease, border-color 0.2s ease, transform 0.2s ease',
                }}
                onMouseOver={e => {
                  e.currentTarget.style.background = 'rgba(255,255,255,0.14)';
                  e.currentTarget.style.borderColor = 'rgba(255,255,255,0.35)';
                  e.currentTarget.style.transform = 'translateY(-3px)';
                }}
                onMouseOut={e => {
                  e.currentTarget.style.background = 'rgba(255,255,255,0.08)';
                  e.currentTarget.style.borderColor = 'rgba(255,255,255,0.2)';
                  e.currentTarget.style.transform = 'translateY(0)';
                }}
              >
                Get Free Estimate <ArrowIcon />
              </a>
            </div>

            {/* Bottom trust line */}
